name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v2.0.0, v2.1.0, etc.

permissions:
  contents: write

jobs:
  # ── Build standalone binaries ────────────────────────────────────────────
  build-binary:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: koppa-linux-x64
            binary: dist/koppa
          - os: windows-latest
            artifact: koppa-windows-x64
            binary: dist/koppa.exe
          - os: macos-latest
            artifact: koppa-macos-x64
            binary: dist/koppa

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build standalone binary
        run: |
          pyinstaller --onefile --name koppa \
            --add-data "stdlib:stdlib" \
            --add-data "examples:examples" \
            src/koppa.py
        shell: bash

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  # ── Build .deb package ──────────────────────────────────────────────────
  build-deb:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-latest
    needs: build-binary

    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: bash pkg/build-deb.sh ${{ github.ref_name }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: koppa-deb
          path: "*.deb"

  # ── Publish to PyPI ──────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-binary
    environment:
      name: pypi
      url: https://pypi.org/project/koppa-lang/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*.whl dist/*.tar.gz

  # ── Create GitHub Release ────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binary, build-deb]

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-binaries/

      - name: Rename binaries for release
        run: |
          mv release-binaries/koppa-linux-x64/koppa      release-binaries/koppa-linux-x64
          mv release-binaries/koppa-windows-x64/koppa.exe release-binaries/koppa-windows-x64.exe
          mv release-binaries/koppa-macos-x64/koppa      release-binaries/koppa-macos-x64
          mv release-binaries/koppa-deb/*.deb             release-binaries/ 2>/dev/null || true

      - name: Create ZIP package
        run: python BUILD_KOPPA.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KOPPA ${{ github.ref_name }}"
          body: |
            ## KOPPA ${{ github.ref_name }}

            ### Install
            ```bash
            pip install koppa-lang==${{ github.ref_name }}
            ```

            Or download the standalone binary for your platform below.

            ### Standalone Binaries (no Python needed)
            | Platform | File |
            |----------|------|
            | Windows  | `koppa-windows-x64.exe` |
            | Linux    | `koppa-linux-x64` |
            | macOS    | `koppa-macos-x64` |
            | Debian/Ubuntu | `koppa_*.deb` |

            ### Quick Start
            ```bash
            koppa run examples/hello.kop
            koppa repl
            ```
          files: |
            release-binaries/koppa-linux-x64
            release-binaries/koppa-windows-x64.exe
            release-binaries/koppa-macos-x64
            release-binaries/*.deb
            KOPPA_v*.zip
          draft: false
          prerelease: false
